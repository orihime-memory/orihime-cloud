<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>織姫</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #0f1115;
      color: #f5f7fb;
      min-height: 100vh;
    }
    .app {
      min-height: 100vh;
      background:
        linear-gradient(rgba(10,12,18,0.62), rgba(10,12,18,0.78)),
        url("orihime_bg.png") center/cover no-repeat;
      padding: 14px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      position: relative;
    }
    .icon-btn {
      border: 0;
      border-radius: 999px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      backdrop-filter: blur(8px);
    }
    .menu {
      display: none;
      position: absolute;
      top: 48px;
      right: 0;
      width: 170px;
      background: rgba(18, 21, 28, 0.95);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      z-index: 10;
    }
    .menu button {
      width: 100%;
      border: 0;
      background: transparent;
      color: #fff;
      text-align: left;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .menu button:hover {
      background: rgba(255,255,255,0.08);
    }
    .panel {
      background: rgba(16, 19, 25, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(12px);
      margin-bottom: 12px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .status-item {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 0.9rem;
    }
    .chat-box {
      min-height: 46vh;
      max-height: 46vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: rgba(115, 150, 255, 0.22);
    }
    .msg.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.08);
    }
    .composer {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-top: 12px;
    }
    .composer textarea {
      flex: 1;
      min-height: 52px;
      max-height: 140px;
      resize: vertical;
      border: 0;
      border-radius: 14px;
      padding: 12px;
      font-size: 1rem;
      color: #fff;
      background: rgba(255,255,255,0.08);
      outline: none;
    }
    .send-btn {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #7b8cff;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .utility-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .utility-row button {
      border: 0;
      border-radius: 12px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
    }
    #file-input { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">織姫</div>
      <div class="top-actions">
        <button class="icon-btn" type="button" onclick="openFile()" aria-label="ファイル選択">📷</button>
        <button class="icon-btn" type="button" onclick="toggleMenu()" aria-label="メニュー">＋</button>
        <div class="menu" id="menu">
          <button type="button" onclick="openFile()">ファイル選択</button>
          <button type="button" onclick="openDict()">辞書</button>
          <button type="button" onclick="openFeeling()">気持ち</button>
          <button type="button" onclick="openHidden()">本音</button>
          <button type="button" onclick="openStory()">執筆</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="status-grid" id="status-box"></div>
    </div>

    <div class="panel">
      <div class="chat-box" id="chat-box"></div>
      <div class="composer">
        <textarea id="user-input" placeholder="織姫に話しかける…"></textarea>
        <button id="send-btn" class="send-btn" type="button">送信</button>
      </div>
      <div class="utility-row">
        <button id="reload-history-btn" type="button">履歴更新</button>
        <button id="dream-btn" type="button">夢保存</button>
        <button id="save-memory-btn" type="button">記憶保存</button>
      </div>
      <input id="file-input" type="file" />
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
