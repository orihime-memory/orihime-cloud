<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>織姫 Cloud</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f1220 url('/orihime_bg.png') center center / cover no-repeat fixed;
      color: #fff;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(10, 12, 24, 0.72);
      padding: 12px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      background: rgba(20, 24, 40, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .status-box {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .status-item {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px;
      font-size: 14px;
    }

    .chat-box {
      height: 52vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .msg {
      max-width: 88%;
      margin: 8px 0;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user {
      margin-left: auto;
      background: #4f7fd6;
      color: white;
    }

    .assistant {
      margin-right: auto;
      background: #6e8b62;
      color: white;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border-radius: 10px;
      border: none;
      padding: 10px;
      font-size: 15px;
      margin-bottom: 10px;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 10px;
      color: white;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: #6f8cff;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button.secondary {
      background: #4d5a7f;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 20px;
      }

      .status-box {
        grid-template-columns: 1fr 1fr;
      }

      .chat-box {
        height: 48vh;
      }

      .msg {
        max-width: 95%;
        font-size: 14px;
      }

      button {
        flex: 1 1 40%;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">
      <h1>織姫 Cloud</h1>

      <div id="status-box" class="status-box"></div>

      <div id="chat-box" class="chat-box"></div>

      <textarea id="user-input" placeholder="織姫に話しかける"></textarea>

      <input type="file" id="file-input">

      <div class="btn-row">
        <button id="send-btn">送信</button>
        <button id="reload-history-btn" class="secondary">履歴更新</button>
        <button id="dream-btn" class="secondary">夢保存</button>
        <button id="save-memory-btn" class="secondary">記憶保存</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
