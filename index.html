<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>織姫</title>
  <style>
    :root {
      --bg: rgba(7, 10, 18, 0.58);
      --panel: rgba(8, 12, 24, 0.34);
      --panel-strong: rgba(8, 12, 24, 0.52);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f6f8ff;
      --muted: rgba(246, 248, 255, 0.74);
      --orihime: rgba(17, 23, 37, 0.78);
      --user: rgba(120, 139, 255, 0.23);
      --accent: #7e92ff;
      --chip: rgba(8, 12, 24, 0.56);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      color: var(--text);
      background: #0a0f18;
    }

    body {
      background-image:
        linear-gradient(rgba(7, 10, 18, 0.38), rgba(7, 10, 18, 0.52)),
        url('/static/orihime_bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .app {
      min-height: 100vh;
      padding: max(18px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom)) 14px;
      backdrop-filter: blur(2px);
    }

    .shell {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 4px 2px;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(13, 18, 31, 0.54);
      color: var(--text);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .camera-btn {
      width: 42px;
      height: 42px;
      font-size: 1rem;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 12px;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .status-card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 12px 14px;
      min-height: 58px;
      display: flex;
      align-items: center;
      font-size: 1rem;
      color: var(--muted);
    }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 56vh;
      gap: 10px;
      padding: 8px 2px 0;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 4px 0 0;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(82%, 720px);
      padding: 15px 18px;
      border-radius: 24px;
      line-height: 1.7;
      font-size: 1rem;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .assistant .bubble {
      background: var(--orihime);
      color: #eef1fb;
    }

    .user .bubble {
      background: var(--user);
      color: #ffffff;
    }

    .composer-wrap {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 8px;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .input {
      min-height: 64px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 18px 18px;
      font: inherit;
      color: var(--text);
      background: rgba(12, 18, 31, 0.50);
      backdrop-filter: blur(16px);
      outline: none;
    }

    .input::placeholder { color: rgba(246,248,255,0.42); }

    .send-btn {
      height: 58px;
      min-width: 76px;
      padding: 0 18px;
      border: none;
      border-radius: 20px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 10px 24px rgba(126, 146, 255, 0.35);
      cursor: pointer;
    }

    .quick-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--chip);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 14px;
      font-size: 0.94rem;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .menu {
      position: absolute;
      top: 58px;
      right: 0;
      width: min(220px, 72vw);
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      background: rgba(9, 13, 24, 0.82);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      z-index: 20;
    }

    .menu.show { display: flex; }

    .menu button {
      border: none;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      text-align: left;
      padding: 12px 14px;
      border-radius: 14px;
      cursor: pointer;
      font: inherit;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 7, 14, 0.44);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      padding: 20px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(760px, 100%);
      max-height: 82vh;
      overflow: auto;
      background: rgba(10, 14, 25, 0.86);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .modal h3 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    .modal-close-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .close-btn {
      border: none;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 999px;
      cursor: pointer;
    }

    .kv-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .kv-item, .note-item, .story-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      line-height: 1.7;
    }

    .kv-key {
      display: inline-block;
      min-width: 70px;
      color: rgba(246,248,255,0.62);
    }

    .hint {
      color: rgba(246,248,255,0.62);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    #fileInput { display: none; }

    @media (max-width: 680px) {
      .title { font-size: 1.6rem; }
      .status-grid { grid-template-columns: 1fr 1fr; }
      .bubble { max-width: 88%; font-size: 0.98rem; }
      .composer { grid-template-columns: 1fr auto; }
      .input { min-height: 58px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="topbar">
        <div class="title">織姫</div>
        <div class="actions">
          <button class="icon-btn camera-btn" onclick="triggerFile()" title="ファイル">📷</button>
          <button class="icon-btn" onclick="toggleMenu()" title="メニュー">＋</button>
          <div id="menu" class="menu">
            <button onclick="triggerFile()">ファイル選択</button>
            <button onclick="openDictionary()">辞書</button>
            <button onclick="openFeeling()">気持ち</button>
            <button onclick="openHonne()">本音</button>
            <button onclick="openWriting()">執筆</button>
          </div>
        </div>
      </header>

      <section id="statusGrid" class="status-grid"></section>

      <main class="chat">
        <div id="messages" class="messages"></div>

        <div class="composer-wrap">
          <div class="composer">
            <textarea id="messageInput" class="input" placeholder="織姫に話しかける..." rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage()">送信</button>
          </div>

          <div class="quick-row">
            <button class="mini-btn" onclick="refreshHistory()">履歴更新</button>
            <button class="mini-btn" onclick="saveDream()">夢保存</button>
            <button class="mini-btn" onclick="saveMemory()">記憶保存</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <input id="fileInput" type="file" accept="image/*,.txt,.md,.doc,.docx,.pdf" onchange="handleFileSelected(event)" />

  <div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-close-row">
        <h3 id="modalTitle">詳細</h3>
        <button class="close-btn" onclick="forceCloseModal()">×</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
