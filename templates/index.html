<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>織姫 Cloud</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #0f1220 url('/static/orihime_bg.png') center center / cover no-repeat fixed;
      color: #fff;
      min-height: 100vh;
    }
    .overlay {
      min-height: 100vh;
      background: rgba(8, 12, 24, 0.32);
      padding: 16px;
    }
    .container {
      max-width: 880px;
      margin: 0 auto;
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding: 8px 0 0;
    }
    h1 { margin: 0; font-size: 26px; font-weight: 700; }
    .icon-row { display:flex; gap:12px; align-items:center; }
    .icon-btn {
      width: 54px; height: 54px; border-radius: 50%;
      border: none; cursor: pointer;
      background: rgba(20,24,40,0.72);
      color: #fff; font-size: 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }
    .status-card, .chat-card, .input-card {
      border-radius: 24px;
      background: rgba(20,24,40,0.42);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
    }
    .status-card { padding: 14px; }
    .status-box {
      display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
    }
    .status-item {
      background: rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 16px;
      font-size: 17px;
      min-height: 70px;
      display:flex; align-items:center;
    }
    .chat-card {
      flex: 1 1 auto;
      overflow: hidden;
      min-height: 220px;
      display:flex;
    }
    .chat-box {
      width:100%;
      overflow-y:auto;
      padding: 16px;
    }
    .msg {
      max-width: 88%;
      margin: 10px 0;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 18px;
    }
    .user { margin-left:auto; background: rgba(91,113,214,0.92); }
    .assistant { margin-right:auto; background: rgba(20,24,40,0.78); }
    .input-card { padding: 14px; position: sticky; bottom: 8px; }
    .input-row { display:flex; gap:12px; align-items:flex-end; }
    textarea {
      width:100%;
      min-height:72px;
      max-height:180px;
      resize:none;
      border:none;
      border-radius: 18px;
      padding: 18px 18px;
      font-size: 18px;
      color:#fff;
      background: rgba(10,12,24,0.54);
      outline:none;
    }
    .send-btn {
      min-width: 96px; height: 72px;
      border:none; border-radius: 22px;
      background: #7d8cff; color:#fff;
      font-size: 18px; font-weight:700; cursor:pointer;
    }
    .bottom-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
    .small-btn {
      border:none; border-radius:16px; padding: 12px 16px;
      background: rgba(14,18,32,0.76); color:#fff; cursor:pointer;
      font-size: 16px;
    }
    .menu {
      position: fixed;
      right: 18px;
      top: 86px;
      z-index: 20;
      display:none;
      width: 220px;
      border-radius: 18px;
      overflow:hidden;
      background: rgba(18,22,36,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }
    .menu button {
      width:100%; text-align:left; border:none; background:transparent; color:#fff;
      padding: 16px 18px; font-size: 16px; cursor:pointer;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .menu button:last-child { border-bottom:none; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display:none; align-items:center; justify-content:center; z-index: 40;
      padding: 16px;
    }
    .modal {
      width:min(900px, 100%);
      max-height: 86vh;
      overflow:auto;
      border-radius: 22px;
      background: rgba(18,22,36,0.95);
      border:1px solid rgba(255,255,255,0.08);
      padding: 18px;
      backdrop-filter: blur(12px);
    }
    .modal h2 { margin: 0 0 12px; }
    .modal textarea { min-height: 160px; margin-bottom: 10px; }
    .modal-close {
      float:right; border:none; background:transparent; color:#fff; font-size:22px; cursor:pointer;
    }
    .history-item { margin: 12px 0; padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.06); }
    .history-role { font-weight:700; margin-bottom: 6px; }
    .muted { opacity:0.72; }
    .hidden-input { display:none; }

    @media (max-width: 640px) {
      .overlay { padding: 12px; }
      .container { min-height: calc(100vh - 24px); }
      h1 { font-size: 22px; }
      .icon-btn { width: 52px; height: 52px; }
      .status-item, .msg, textarea, .small-btn { font-size: 15px; }
      .send-btn { min-width: 86px; font-size: 17px; }
      .status-box { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">
      <div class="topbar">
        <h1>織姫</h1>
        <div class="icon-row">
          <button class="icon-btn" id="camera-btn" title="カメラ">📷</button>
          <button class="icon-btn" id="menu-btn" title="メニュー">＋</button>
        </div>
      </div>

      <div class="status-card">
        <div id="status-box" class="status-box"></div>
      </div>

      <div class="chat-card">
        <div id="chat-box" class="chat-box"></div>
      </div>

      <div class="input-card">
        <div class="input-row">
          <textarea id="user-input" placeholder="織姫に話しかける..."></textarea>
          <button id="send-btn" class="send-btn">送信</button>
        </div>

        <div class="bottom-row">
          <button id="reload-history-btn" class="small-btn">履歴更新</button>
          <button id="dream-btn" class="small-btn">夢保存</button>
          <button id="save-memory-btn" class="small-btn">記憶保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="menu" id="menu">
    <button id="file-btn">ファイル選択</button>
    <button id="dict-btn">辞書</button>
    <button id="feeling-btn">気持ち</button>
    <button id="hidden-btn">本音</button>
    <button id="history-open-btn">会話履歴</button>
  </div>

  <input type="file" id="file-input" class="hidden-input" accept=".txt,.docx,.png,.jpg,.jpeg,.webp">
  <input type="file" id="camera-input" class="hidden-input" accept="image/*" capture="environment">

  <div id="modal-backdrop" class="modal-backdrop">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
